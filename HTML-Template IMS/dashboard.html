<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard - IMS Admin</title>

    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Admin layout CSS -->
    <link href="css/admin.css" rel="stylesheet">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-brand">
                <i class="bi bi-box-seam"></i>
                <span>IMS Admin</span>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link active" href="dashboard.html">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-link" href="categories.html">
                    <i class="bi bi-tags"></i>
                    <span>Categories</span>
                </a>
                <a class="nav-link" href="products.html">
                    <i class="bi bi-box"></i>
                    <span>Products</span>
                </a>
                <a class="nav-link" href="stock.html">
                    <i class="bi bi-archive"></i>
                    <span>Product Stock</span>
                </a>
                <a class="nav-link" href="pos.html">
                    <i class="bi bi-receipt"></i>
                    <span>POS / Invoice</span>
                </a>
                <a class="nav-link" href="invoices.html">
                    <i class="bi bi-list-ul"></i>
                    <span>Invoices</span>
                </a>
            </nav>
        </aside>

        <!-- Main content area -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-link d-none d-lg-inline p-0 text-dark" type="button" id="sidebarCollapseToggle" aria-label="Collapse sidebar">
                        <i class="bi bi-layout-sidebar-inset fs-5"></i>
                    </button>
                    <button class="btn btn-link d-lg-none p-0 text-dark" type="button" id="sidebarToggle" aria-label="Toggle sidebar">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h1 class="h5 mb-0 text-muted">Dashboard</h1>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-muted small">Tue, Feb 4, 2026</span>
                </div>
            </header>

            <div class="admin-content">
                <div class="row g-4 mb-4">
                    <div class="col-sm-6 col-xl-3">
                        <div class="card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-3 bg-primary bg-opacity-10 p-3">
                                    <i class="bi bi-tags text-primary fs-3"></i>
                                </div>
                                <div>
                                    <p class="text-muted small mb-0">Categories</p>
                                    <h4 class="mb-0">3</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-3 bg-success bg-opacity-10 p-3">
                                    <i class="bi bi-box text-success fs-3"></i>
                                </div>
                                <div>
                                    <p class="text-muted small mb-0">Products</p>
                                    <h4 class="mb-0">8</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-3 bg-info bg-opacity-10 p-3">
                                    <i class="bi bi-archive text-info fs-3"></i>
                                </div>
                                <div>
                                    <p class="text-muted small mb-0">Stock Items</p>
                                    <h4 class="mb-0">320</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-3 bg-warning bg-opacity-10 p-3">
                                    <i class="bi bi-receipt text-warning fs-3"></i>
                                </div>
                                <div>
                                    <p class="text-muted small mb-0">Invoices</p>
                                    <h4 class="mb-0">42</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="card">
                            <div class="card-header">Recent Activity</div>
                            <div class="card-body">
                                <p class="text-muted mb-0">Activity summary will appear here once connected to APIs.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card">
                            <div class="card-header">Quick Actions</div>
                            <div class="card-body">
                                <div class="d-grid gap-2">
                                    <a href="pos.html" class="btn btn-primary">
                                        <i class="bi bi-receipt me-2"></i> New Invoice (POS)
                                    </a>
                                    <a href="products.html" class="btn btn-outline-primary">
                                        <i class="bi bi-box me-2"></i> Add Product
                                    </a>
                                    <a href="stock.html" class="btn btn-outline-secondary">
                                        <i class="bi bi-archive me-2"></i> Stock In
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap 5 JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Admin layout JS -->
    <script src="js/admin.js"></script>
</body>
</html>
